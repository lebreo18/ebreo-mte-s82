<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopNest - Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --brand-dark: #0f0f1a;
      --brand-mid: #1a1a2e;
      --brand-accent: #e94560;
      --brand-accent-hover: #c73650;
      --brand-gold: #f5a623;
      --brand-light: #f8f8fc;
      --text-muted-custom: #9090aa;
    }

    * { box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #fff;
      color: #1a1a2e;
      margin: 0;
    }

    /* ── NAVBAR ── */
    .navbar {
      background-color: var(--brand-dark) !important;
      padding: 1rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      border-bottom: 2px solid var(--brand-accent);
    }
    .navbar-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: #fff !important;
    }
    .navbar-brand span { color: var(--brand-accent); }
    .navbar .nav-link {
      color: rgba(255,255,255,0.75) !important;
      font-size: 0.875rem;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: color 0.2s;
    }
    .navbar .nav-link:hover,
    .navbar .nav-link.active { color: var(--brand-accent) !important; }
    .navbar-toggler { border-color: rgba(233,69,96,0.5); }
    .navbar-toggler-icon {
      background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28233,69,96,0.85%29' stroke-linecap='round' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    }

    /* ── SHARED SECTION STYLES ── */
    section { padding: 80px 0; }
    .section-eyebrow {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-accent);
      margin-bottom: 0.5rem;
    }
    .section-heading {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 3.5vw, 2.4rem);
      font-weight: 700;
      color: var(--brand-dark);
      margin-bottom: 0.6rem;
    }
    .section-sub {
      font-size: 0.95rem;
      color: var(--text-muted-custom);
      max-width: 560px;
      line-height: 1.7;
    }
    .divider-accent {
      width: 40px;
      height: 3px;
      background: var(--brand-accent);
      border-radius: 2px;
      margin: 1rem 0 1.8rem;
    }

    /* ── HERO ── */
    #hero {
      background: linear-gradient(135deg, var(--brand-dark) 0%, #16213e 60%, #0f3460 100%);
      min-height: 90vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }
    #hero::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(233,69,96,0.18) 0%, transparent 70%);
      top: -100px;
      right: -100px;
      border-radius: 50%;
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brand-accent);
      margin-bottom: 1rem;
    }
    .hero-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 900;
      color: #fff;
      line-height: 1.1;
      margin-bottom: 1.4rem;
    }
    .hero-headline em { font-style: normal; color: var(--brand-accent); }
    .hero-sub {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.65);
      max-width: 480px;
      line-height: 1.7;
      margin-bottom: 2.2rem;
    }
    .hero-stat {
      text-align: center;
      padding: 1.2rem;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
    }
    .hero-stat .num {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--brand-gold);
    }
    .hero-stat .lbl {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.5);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    /* ── BUTTONS ── */
    .btn-accent {
      background-color: var(--brand-accent);
      color: #fff;
      border: none;
      padding: 0.78rem 2rem;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border-radius: 4px;
      text-decoration: none;
      display: inline-block;
      transition: background-color 0.2s, transform 0.15s;
    }
    .btn-accent:hover { background-color: var(--brand-accent-hover); color: #fff; transform: translateY(-1px); }
    .btn-outline-ghost {
      background: transparent;
      color: rgba(255,255,255,0.8);
      border: 1px solid rgba(255,255,255,0.3);
      padding: 0.78rem 2rem;
      font-size: 0.9rem;
      font-weight: 500;
      border-radius: 4px;
      text-decoration: none;
      display: inline-block;
      transition: all 0.2s;
    }
    .btn-outline-ghost:hover { background: rgba(255,255,255,0.1); color: #fff; }

    /* ── INTRODUCTION ── */
    #introduction { background-color: var(--brand-light); }
    .intro-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: rgba(233,69,96,0.1);
      color: var(--brand-accent);
      border-radius: 50px;
      padding: 0.35rem 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .intro-feature {
      display: flex;
      align-items: flex-start;
      gap: 0.9rem;
      padding: 1.1rem;
      border-radius: 8px;
      transition: background 0.2s;
    }
    .intro-feature:hover { background: rgba(233,69,96,0.04); }
    .intro-icon {
      width: 44px;
      height: 44px;
      background: var(--brand-accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .intro-feature h6 { font-weight: 600; color: var(--brand-dark); margin-bottom: 0.2rem; font-size: 0.95rem; }
    .intro-feature p { font-size: 0.85rem; color: var(--text-muted-custom); margin: 0; line-height: 1.6; }

    /* ── FEATURED ── */
    #featured { background: #fff; }
    .product-card {
      border: 1px solid #ebebf5;
      border-radius: 10px;
      overflow: hidden;
      transition: box-shadow 0.25s, transform 0.2s;
      background: #fff;
      height: 100%;
    }
    .product-card:hover { box-shadow: 0 12px 32px rgba(15,15,26,0.1); transform: translateY(-3px); }
    .product-img {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #f0f0f8, #e0e0f0);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-muted-custom);
      font-size: 2.5rem;
    }
    .product-body { padding: 1.1rem; }
    .product-cat { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--brand-accent); margin-bottom: 0.3rem; }
    .product-body h5 { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 700; color: var(--brand-dark); margin-bottom: 0.25rem; }
    .product-body p { font-size: 0.82rem; color: var(--text-muted-custom); margin-bottom: 0.8rem; line-height: 1.5; }
    .product-price { font-weight: 700; font-size: 1.1rem; color: var(--brand-dark); }
    .product-price small { font-size: 0.75rem; color: var(--text-muted-custom); text-decoration: line-through; font-weight: 400; }
    .btn-read-more {
      background: var(--brand-dark);
      color: #fff;
      border: none;
      padding: 0.45rem 1.1rem;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-read-more:hover { background: var(--brand-accent); }

    /* ── CATEGORIES SECTION ── */
    #categories-section { background: var(--brand-light); }
    .cat-card {
      border: 1px solid #ebebf5;
      border-radius: 10px;
      overflow: hidden;
      text-align: center;
      transition: box-shadow 0.2s, transform 0.2s;
      background: #fff;
    }
    .cat-card:hover { box-shadow: 0 8px 24px rgba(15,15,26,0.1); transform: translateY(-2px); }
    .cat-img {
      width: 100%;
      height: 120px;
      background: linear-gradient(135deg, #e8e8f8, #d5d5ef);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      color: var(--brand-mid);
    }
    .cat-body { padding: 0.9rem; }
    .cat-body h6 { font-weight: 600; font-size: 0.9rem; color: var(--brand-dark); margin-bottom: 0.6rem; }
    .btn-view {
      background: var(--brand-mid);
      color: #fff;
      border: none;
      padding: 0.38rem 0.95rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      border-radius: 4px;
      text-decoration: none;
      display: inline-block;
      transition: background 0.2s;
    }
    .btn-view:hover { background: var(--brand-accent); color: #fff; }

    /* ── CATEGORIES ── */
    #categories { background: #fff; }

    /* ── RESOURCES ── */
    #resources { background: var(--brand-light); }
    .resource-card {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      padding: 1.1rem;
      border: 1px solid #ebebf5;
      border-radius: 10px;
      background: #fff;
      transition: box-shadow 0.2s;
    }
    .resource-card:hover { box-shadow: 0 6px 20px rgba(15,15,26,0.08); }
    .resource-thumb {
      width: 90px;
      height: 70px;
      background: linear-gradient(135deg, #e5e5f5, #d0d0eb);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: var(--brand-mid);
      flex-shrink: 0;
    }
    .resource-info h6 { font-weight: 600; font-size: 0.95rem; color: var(--brand-dark); margin-bottom: 0.3rem; }
    .resource-info p { font-size: 0.82rem; color: var(--text-muted-custom); margin: 0; line-height: 1.5; }
    .map-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #dce8f0, #c8dde8);
      border-radius: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--brand-mid);
      font-size: 2rem;
      gap: 0.5rem;
      border: 1px solid #c0d0dc;
    }
    .map-placeholder span { font-size: 0.8rem; font-weight: 500; color: var(--text-muted-custom); }

    /* ── ABOUT ── */
    #about { background: var(--brand-dark); }
    .about-heading { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 3vw, 2.2rem); color: #fff; font-weight: 700; }
    .about-text { color: rgba(255,255,255,0.65); font-size: 0.95rem; line-height: 1.8; }
    .about-stat {
      padding: 1rem;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
    }
    .about-stat .stat-num { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--brand-gold); font-weight: 700; }
    .about-stat .stat-lbl { color: rgba(255,255,255,0.5); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── MISSION ── */
    #mission { background: var(--brand-mid); }
    .mission-heading { font-family: 'Playfair Display', serif; color: #fff; font-weight: 700; font-size: 1.5rem; }
    .mission-line { height: 2px; background: linear-gradient(90deg, var(--brand-accent), transparent); margin: 1.2rem 0; }
    .mission-text { color: rgba(255,255,255,0.7); font-size: 0.95rem; line-height: 1.8; font-style: italic; }
    .mission-pillar i { font-size: 1.5rem; color: var(--brand-accent); }
    .mission-pillar span { color: rgba(255,255,255,0.6); font-size: 0.8rem; }

    /* ── CONTACT ── */
    #contact { background: var(--brand-dark); }
    .contact-heading { font-family: 'Playfair Display', serif; color: #fff; font-weight: 700; }
    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      padding: 0.9rem 1.1rem;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      margin-bottom: 0.8rem;
    }
    .contact-item i { font-size: 1.2rem; color: var(--brand-accent); }
    .contact-item span { color: rgba(255,255,255,0.75); font-size: 0.9rem; }
    .contact-form {
      padding: 1.5rem;
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .contact-form label { color: rgba(255,255,255,0.6); font-size: 0.82rem; display: block; margin-bottom: 0.4rem; }
    .contact-form .form-control {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.12);
      color: #fff;
    }
    .contact-form .form-control::placeholder { color: rgba(255,255,255,0.3); }
    .contact-form .form-control:focus { background: rgba(255,255,255,0.08); border-color: var(--brand-accent); box-shadow: 0 0 0 0.2rem rgba(233,69,96,0.15); color: #fff; }

    /* ── FOOTER ── */
    footer {
      background: #070710
