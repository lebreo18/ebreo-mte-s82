<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopNest - Home</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  
  <style>
    :root {
      --brand-dark: #1a1a2e;
      --brand-mid: #16213e;
      --brand-accent: #e94560;
      --brand-light: #f5f5f5;
      --brand-muted: #6c757d;
      --card-radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #fff;
      color: #222;
    }

    .navbar {
      background-color: var(--brand-dark) !important;
      padding: 0.75rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .navbar .navbar-brand { color: #fff; font-size: 1.5rem; font-weight: 700; }
    .navbar .navbar-brand span { color: var(--brand-accent); }

    #hero {
      background: linear-gradient(135deg, var(--brand-dark) 0%, var(--brand-mid) 60%, #0f3460 100%);
      color: #fff;
      min-height: 90vh;
      display: flex;
      align-items: center;
      padding: 5rem 0;
    }

    .card {
      border: 1px solid #e8e8e8;
      border-radius: var(--card-radius);
      overflow: hidden;
      transition: transform .25s, box-shadow .25s;
      height: 100%;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
      <a class="navbar-brand" href="#">Shop<span>Nest</span></a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="navMenu">
        <ul class="navbar-nav gap-2">
          <li class="nav-item"><a class="nav-link" href="#hero">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="#Introduction">Intro</a></li>
          <li class="nav-item"><a class="nav-link" href="#featured">Featured</a></li>
          <li class="nav-item"><a class="nav-link" href="#categories-section">Categories</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- HERO SECTION -->
  <section id="hero">
    <div class="container">
      <div class="row align-items-center gy-5">
        <div class="col-lg-6">
          <h1>Discover <span>Products</span> You'll Love</h1>
          <p class="mt-3">Curated collections across electronics, fashion, home goods, and more.</p>
          <a href="#featured" class="btn btn-danger btn-lg">Shop Now</a>
        </div>
        <div class="col-lg-6">
          <div class="hero-img-placeholder">🛍️</div>
        </div>
      </div>
    </div>
  </section>

  <!-- FEATURED SECTION (with cards) -->
  <section id="featured" class="py-5">
    <div class="container">
      <div class="row g-4">
        <div class="col-6 col-md-3">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Laptop Pro</h5>
              <p class="card-text">$899.99</p>
              <button class="btn btn-dark">View Product</button>
            </div>
          </div>
        </div>

        <div class="col-6 col-md-3">
          <div class="card">
            <div class="card-body">
              <h5 class="card-title">Wireless Headphones</h5>
              <p class="card-text">$129.99</p>
              <button class="btn btn-dark">View Product</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
